services:
  backend:
    container_name: go-rest-api-template
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8001:8001
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: go_app_dev
      POSTGRES_HOST: dockerPostgres
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5435
      # Load from a project-root `.env` file (Compose interpolates it) or from the shell environment.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set - copy .env.example to .env and fill secrets}
      API_SECRET_KEY: ${API_SECRET_KEY:?API_SECRET_KEY must be set - copy .env.example to .env and fill secrets}
      REDIS_HOST: redis
      MONGODB_URI: mongodb://mongo:27017
      # Enables HSTS/CSP and XSS middleware in pkg/api/router.go (Gin release mode).
      GIN_MODE: release

  db:
    image: postgres:14.1-alpine
    restart: always
    container_name: dockerPostgres
    volumes:
      # Official postgres image stores cluster data under PGDATA (default /var/lib/postgresql/data).
      - .dbdata:/var/lib/postgresql/data
    ports:
      - "5435:5435"
    environment:
      - POSTGRES_DB=go_app_dev
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=password
    command: -p 5435
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d go_app_dev -p 5435"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    container_name: dockerRedis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mongo:
    image: mongo
    container_name: dockerMongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mongo_data: # Declare the volume for MongoDB data
